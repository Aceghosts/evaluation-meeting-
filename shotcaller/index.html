<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShotCaller — Higgsfield Prompt Studio</title>
<meta name="description" content="Turn a screenplay into paste-ready, cinematography-precise AI video prompts. A Convex Interactive production tool.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
:root{
  --bg:#0A0A0F;
  --surface:#12121B;
  --surface-2:#191926;
  --surface-3:#20202E;
  --line:rgba(255,255,255,.07);
  --line-2:rgba(255,255,255,.13);
  --ink:#EDEDF3;
  --ink-2:#B4B4C4;
  --muted:#7C7C92;
  --neon:#3B7BFF;
  --neon-bright:#6FA0FF;
  --neon-dim:rgba(59,123,255,.14);
  --neon-glow:rgba(59,123,255,.4);
  --ok:#34D399;
  --warn:#FBBF24;
  --stage:#F87171;
  --radius:14px;
  --ease:cubic-bezier(.4,0,.2,1);
  --ease-out:cubic-bezier(.22,1,.36,1);
  --mono:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--ink);
  font-family:'Inter',sans-serif;font-size:15px;line-height:1.6;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;
}
::selection{background:var(--neon);color:#fff}
button,input,textarea,select{font-family:inherit}
button{cursor:pointer;border:none;background:none;color:inherit}
a{color:inherit;text-decoration:none}
.disp{font-family:'Space Grotesk',sans-serif}
.uc{text-transform:uppercase;letter-spacing:.14em}
.mono{font-family:var(--mono)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:10px;border:2px solid var(--bg)}
::-webkit-scrollbar-track{background:transparent}

/* ambient glow */
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(700px 500px at 78% -8%,rgba(59,123,255,.10),transparent 70%),
    radial-gradient(600px 500px at 12% 108%,rgba(59,123,255,.06),transparent 70%);
}

/* ---------- shell ---------- */
.app{display:grid;grid-template-columns:242px 1fr;min-height:100vh;position:relative;z-index:1}
.sidebar{
  background:rgba(18,18,27,.6);border-right:1px solid var(--line);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  display:flex;flex-direction:column;position:sticky;top:0;height:100vh;
}
.brand{display:flex;align-items:center;gap:11px;padding:22px 20px 20px}
.brand-mark{
  width:34px;height:34px;border-radius:9px;flex:none;position:relative;
  background:linear-gradient(135deg,var(--neon),#7C5BFF);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 20px var(--neon-glow);
}
.brand-mark svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.brand b{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:600;letter-spacing:-.01em;display:block;line-height:1.1}
.brand small{font-size:11px;color:var(--muted)}
.nav{padding:6px 12px;display:flex;flex-direction:column;gap:2px}
.nav-item{
  display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:9px;
  font-size:14px;font-weight:500;color:var(--ink-2);width:100%;text-align:left;
  transition:background .15s var(--ease),color .15s var(--ease);
}
.nav-item svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;opacity:.75}
.nav-item:hover{background:var(--surface-2)}
.nav-item.active{background:var(--neon-dim);color:var(--neon-bright)}
.nav-item.active svg{opacity:1}
.side-profile{margin-top:auto;padding:16px;border-top:1px solid var(--line)}
.sp-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sp-head b{font-family:'Space Grotesk',sans-serif;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-2)}
.sp-head .lvl{font-family:var(--mono);font-size:10px;color:var(--neon-bright)}
.sp-bar{height:6px;border-radius:6px;background:var(--surface-3);overflow:hidden;margin-bottom:8px}
.sp-bar i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--neon),var(--neon-bright));width:0;transition:width .6s var(--ease-out);box-shadow:0 0 10px var(--neon-glow)}
.sp-note{font-size:11px;color:var(--muted);line-height:1.4}

/* ---------- main ---------- */
.main{min-width:0;display:flex;flex-direction:column}
.topbar{
  position:sticky;top:0;z-index:20;
  background:rgba(10,10,15,.72);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px;padding:13px 30px;
}
.crumb{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:8px}
.crumb b{color:var(--ink-2);font-weight:500}
.spacer{flex:1}
.btn{
  display:inline-flex;align-items:center;gap:8px;padding:9px 16px;border-radius:10px;
  font-size:14px;font-weight:600;white-space:nowrap;
  transition:transform .12s var(--ease),box-shadow .18s var(--ease),background .15s var(--ease),border-color .15s var(--ease),color .15s var(--ease);
}
.btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.btn-primary{background:var(--neon);color:#fff;box-shadow:0 0 0 rgba(59,123,255,0)}
.btn-primary:hover{background:var(--neon-bright);box-shadow:0 6px 26px var(--neon-glow)}
.btn-primary:active{transform:translateY(1px)}
.btn-ghost{background:var(--surface-2);border:1px solid var(--line-2);color:var(--ink-2)}
.btn-ghost:hover{border-color:var(--muted);color:var(--ink)}
.btn-soft{background:var(--neon-dim);color:var(--neon-bright)}
.btn-soft:hover{background:rgba(59,123,255,.2)}

.content{padding:34px 30px 80px;max-width:1240px;width:100%;margin:0 auto;flex:1}
.eyebrow{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--neon-bright);margin-bottom:10px}
.page-head h1{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:600;letter-spacing:-.02em}
.page-head p{color:var(--muted);font-size:14.5px;margin-top:5px;max-width:64ch}

/* ---------- library ---------- */
.lib-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;margin-top:26px}
.proj-card{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:20px;cursor:pointer;transition:transform .18s var(--ease-out),box-shadow .18s var(--ease),border-color .18s var(--ease);
  position:relative;overflow:hidden;
}
.proj-card:hover{transform:translateY(-3px);border-color:var(--line-2);box-shadow:0 14px 40px rgba(0,0,0,.4)}
.pc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:15px}
.type-badge{
  display:inline-flex;align-items:center;gap:6px;font-family:'Space Grotesk',sans-serif;
  font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:5px 10px;border-radius:100px;
}
.type-product{background:rgba(251,191,36,.14);color:#FBBF24}
.type-ugc{background:rgba(52,211,153,.14);color:#34D399}
.type-dvc{background:var(--neon-dim);color:var(--neon-bright)}
.pc-ar{font-family:var(--mono);font-size:11px;color:var(--muted)}
.proj-card h3{font-size:17px;font-weight:600;letter-spacing:-.01em;margin-bottom:6px}
.proj-card .excerpt{font-size:13px;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:16px}
.pc-meta{display:flex;gap:16px;padding-top:14px;border-top:1px solid var(--line);font-size:12px;color:var(--muted)}
.pc-meta b{color:var(--ink-2);font-family:var(--mono);font-weight:500}
.new-card{
  border:1.5px dashed var(--line-2);background:transparent;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;color:var(--muted);min-height:200px;font-weight:500;
}
.new-card:hover{border-color:var(--neon);color:var(--neon-bright);background:var(--neon-dim);transform:translateY(-3px)}
.new-card svg{width:26px;height:26px;stroke:currentColor;fill:none;stroke-width:1.6}

/* ---------- back ---------- */
.back{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:500;color:var(--muted);margin-bottom:20px;transition:color .15s}
.back:hover{color:var(--ink)}
.back svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2}

/* ---------- new project form ---------- */
.form{max-width:760px}
.fld{margin-bottom:20px}
.lbl{display:block;font-size:13px;font-weight:600;color:var(--ink-2);margin-bottom:8px}
.lbl span{color:var(--muted);font-weight:400}
.form textarea,.form input,.form select{
  width:100%;background:var(--surface);border:1px solid var(--line-2);border-radius:11px;
  padding:13px 15px;font-size:14.5px;color:var(--ink);outline:none;
  transition:border-color .15s var(--ease),box-shadow .15s var(--ease);
}
.form textarea{min-height:200px;resize:vertical;line-height:1.6;font-family:var(--mono);font-size:13.5px}
.form input:focus,.form textarea:focus,.form select:focus{border-color:var(--neon);box-shadow:0 0 0 3px var(--neon-dim)}
.form-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.drop-hint{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);margin-top:8px}
.drop-hint svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8}
.samples{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.sample-pill{font-size:12px;padding:6px 12px;border-radius:100px;border:1px solid var(--line-2);color:var(--ink-2);transition:all .15s}
.sample-pill:hover{border-color:var(--neon);color:var(--neon-bright)}
.form-actions{display:flex;gap:12px;margin-top:24px}

/* ---------- classification ---------- */
.classify-wrap{max-width:640px;margin:40px auto;text-align:center}
.classify-card{
  background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:40px 36px;position:relative;overflow:hidden;
}
.classify-card::before{content:"";position:absolute;left:50%;top:-120px;width:300px;height:300px;margin-left:-150px;border-radius:50%;background:radial-gradient(circle,var(--neon-dim),transparent 65%);filter:blur(30px)}
.classify-card .robo{width:52px;height:52px;margin:0 auto 18px;border-radius:14px;background:var(--neon-dim);display:flex;align-items:center;justify-content:center}
.classify-card .robo svg{width:26px;height:26px;stroke:var(--neon-bright);fill:none;stroke-width:1.6}
.classify-card h2{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:500;color:var(--muted);margin-bottom:6px}
.classify-card .verdict{font-family:'Space Grotesk',sans-serif;font-size:30px;font-weight:600;letter-spacing:-.02em;margin-bottom:6px}
.classify-card .reason{font-size:14px;color:var(--ink-2);max-width:44ch;margin:0 auto 8px;line-height:1.6}
.classify-card .conf{font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:26px}
.type-pills{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:26px}
.type-pill{
  padding:12px 18px;border-radius:12px;border:1px solid var(--line-2);background:var(--surface-2);text-align:center;min-width:120px;
  transition:all .15s var(--ease);
}
.type-pill:hover{border-color:var(--muted)}
.type-pill.sel{border-color:var(--neon);background:var(--neon-dim);box-shadow:0 0 0 3px var(--neon-dim)}
.type-pill b{display:block;font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600}
.type-pill small{font-size:11px;color:var(--muted)}
.type-pill.sel small{color:var(--neon-bright)}

/* ---------- intake wizard modal ---------- */
.wizard-overlay{
  position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;
  background:rgba(6,6,10,.78);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  opacity:0;pointer-events:none;transition:opacity .3s var(--ease);
}
.wizard-overlay.open{opacity:1;pointer-events:auto}
.wizard{
  width:min(560px,100%);background:var(--surface);border:1px solid var(--line-2);border-radius:20px;overflow:hidden;
  box-shadow:0 30px 90px rgba(0,0,0,.6);
}
.wiz-prog{height:3px;background:var(--surface-3)}
.wiz-prog i{display:block;height:100%;background:linear-gradient(90deg,var(--neon),var(--neon-bright));transition:width .4s var(--ease-out);box-shadow:0 0 10px var(--neon-glow)}
.wiz-body{padding:30px 34px 26px}
.wiz-step{font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.wiz-q{font-family:'Space Grotesk',sans-serif;font-size:21px;font-weight:600;letter-spacing:-.01em;line-height:1.3;margin-bottom:20px}
.wiz-opts{display:flex;flex-direction:column;gap:9px;margin-bottom:8px}
.wiz-opt{
  position:relative;text-align:left;padding:13px 15px;border-radius:11px;border:1px solid var(--line-2);
  background:var(--surface-2);font-size:14px;transition:all .14s var(--ease);
}
.wiz-opt:hover{border-color:var(--muted)}
.wiz-opt.sel{border-color:var(--neon);background:var(--neon-dim)}
.wiz-opt .aipick{
  position:absolute;top:50%;right:13px;transform:translateY(-50%);
  font-family:var(--mono);font-size:9px;letter-spacing:.08em;color:var(--neon-bright);
  background:var(--neon-dim);padding:3px 8px;border-radius:100px;display:flex;align-items:center;gap:4px;
}
.wiz-other{margin-top:9px}
.wiz-other input{width:100%;background:var(--surface-2);border:1px solid var(--line-2);border-radius:11px;padding:12px 15px;font-size:14px;color:var(--ink);outline:none}
.wiz-other input:focus{border-color:var(--neon)}
.wiz-foot{display:flex;align-items:center;justify-content:space-between;padding:16px 34px;border-top:1px solid var(--line);background:var(--surface-2)}
.wiz-back{font-size:13px;color:var(--muted);font-weight:500}
.wiz-back:hover{color:var(--ink)}
.wiz-back:disabled{opacity:.3;cursor:default}

/* ---------- loading slate ---------- */
.slate-wrap{max-width:520px;margin:80px auto;text-align:center}
.slate{
  width:200px;height:130px;margin:0 auto 24px;border-radius:12px;overflow:hidden;position:relative;
  background:var(--surface-2);border:1px solid var(--line-2);
}
.slate-top{height:34px;display:flex;background:repeating-linear-gradient(115deg,#1a1a26 0 20px,var(--ink) 20px 40px);transform-origin:left center;animation:clap 1.4s var(--ease-out) infinite}
@keyframes clap{0%,100%{transform:rotate(0)}20%{transform:rotate(-16deg)}40%{transform:rotate(0)}}
.slate-body{position:absolute;left:0;right:0;bottom:0;top:34px;padding:12px 14px;font-family:var(--mono);font-size:10px;color:var(--muted);text-align:left;line-height:1.9}
.slate-body b{color:var(--neon-bright)}
.slate-wrap h2{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:600;margin-bottom:8px}
.slate-status{font-family:var(--mono);font-size:12px;color:var(--muted);min-height:20px}

/* ---------- shot deck ---------- */
.deck-head{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:16px}
.deck-title h1{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:600;letter-spacing:-.02em}
.summary-bar{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.chip{
  font-family:var(--mono);font-size:11px;padding:6px 11px;border-radius:100px;
  border:1px solid var(--line-2);color:var(--ink-2);display:inline-flex;align-items:center;gap:6px;
}
.deck-actions{display:flex;gap:10px;flex-wrap:wrap}

.section-label{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:34px 0 14px;display:flex;align-items:center;gap:10px}
.section-label::after{content:"";flex:1;height:1px;background:var(--line)}

/* moodboard */
.mood-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.mini-card{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:16px}
.mini-card .mc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.mini-card h4{font-size:13px;font-weight:600}
.rec-tag{font-family:var(--mono);font-size:9px;color:var(--ok);background:rgba(52,211,153,.12);padding:3px 7px;border-radius:100px}
.prompt-block{
  font-family:var(--mono);font-size:12px;line-height:1.65;color:var(--ink-2);
  background:var(--bg);border:1px solid var(--line);border-left:2px solid var(--neon);border-radius:9px;
  padding:12px 13px;position:relative;max-height:150px;overflow:auto;white-space:pre-wrap;
}
.mini-card .prompt-block{max-height:120px;margin-bottom:10px}

/* shot cards */
.shot-list{display:flex;flex-direction:column;gap:16px}
.shot-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
.sc-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--line)}
.sc-num{font-family:var(--mono);font-size:11px;color:var(--neon-bright);letter-spacing:.1em}
.sc-title{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:600;margin-top:2px}
.sc-dur{font-family:var(--mono);font-size:11px;color:var(--muted)}
.sc-body{padding:18px 20px}
.tabs{display:flex;gap:6px;margin-bottom:14px}
.tab{
  font-size:12.5px;font-weight:500;padding:7px 13px;border-radius:9px;color:var(--muted);
  border:1px solid transparent;transition:all .14s var(--ease);
}
.tab:hover{color:var(--ink-2)}
.tab.active{background:var(--surface-2);color:var(--ink);border-color:var(--line-2)}
.copy-btn{
  position:absolute;top:9px;right:9px;font-size:11px;font-weight:600;padding:5px 11px;border-radius:8px;
  background:var(--surface-2);border:1px solid var(--line-2);color:var(--ink-2);display:inline-flex;align-items:center;gap:6px;
  transition:all .14s var(--ease);z-index:2;
}
.copy-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}
.copy-btn:hover{border-color:var(--neon);color:var(--neon-bright)}
.copy-btn.done{background:rgba(52,211,153,.14);border-color:rgba(52,211,153,.4);color:var(--ok)}
.prompt-block.full{max-height:none}
.pb-pad{padding-right:88px}

.sc-tools{display:flex;gap:10px;margin-top:14px}
.tool-btn{
  font-size:12.5px;font-weight:500;padding:8px 13px;border-radius:9px;color:var(--ink-2);
  background:var(--surface-2);border:1px solid var(--line-2);display:inline-flex;align-items:center;gap:7px;
  transition:all .14s var(--ease);
}
.tool-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8}
.tool-btn:hover{border-color:var(--neon);color:var(--neon-bright)}

/* camera controls panel */
.controls-panel{
  margin-top:14px;border-top:1px solid var(--line);overflow:hidden;
  max-height:0;transition:max-height .35s var(--ease);
}
.controls-panel.open{max-height:1600px}
.cp-inner{padding-top:18px}
.control-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.control{position:relative}
.control label{display:block;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.select-wrap{position:relative}
.select-wrap select{
  width:100%;appearance:none;background:var(--surface-2);border:1px solid var(--line-2);border-radius:10px;
  padding:10px 34px 10px 13px;font-size:13.5px;color:var(--ink);outline:none;cursor:pointer;
}
.select-wrap select:focus{border-color:var(--neon)}
.select-wrap::after{content:"▾";position:absolute;right:13px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;font-size:11px}
.control .explain{font-size:11.5px;color:var(--muted);margin-top:6px;line-height:1.45;min-height:16px}
.flag{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-family:var(--mono);margin-left:6px}
.flag i{width:7px;height:7px;border-radius:50%}
.flag-ok i{background:var(--ok)}
.flag-warn i{background:var(--warn)}
.flag-stage i{background:var(--stage)}
.stage-warn{
  margin-top:12px;display:flex;gap:9px;align-items:flex-start;font-size:12px;color:var(--warn);line-height:1.45;
  background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.2);border-radius:9px;padding:10px 12px;
}
.stage-warn svg{width:15px;height:15px;flex:none;margin-top:1px;stroke:currentColor;fill:none;stroke-width:1.8}
.cp-actions{display:flex;gap:10px;margin-top:16px}

/* visual shot picker */
.picker{margin-top:16px}
.picker-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.pk-tab{font-size:12px;font-weight:500;padding:6px 12px;border-radius:8px;color:var(--muted);border:1px solid var(--line);transition:all .14s}
.pk-tab:hover{color:var(--ink-2)}
.pk-tab.active{background:var(--surface-2);color:var(--ink);border-color:var(--line-2)}
.pk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(104px,1fr));gap:10px}
.pk-cell{
  cursor:pointer;border-radius:10px;overflow:hidden;border:1.5px solid var(--line);background:var(--surface-2);
  transition:border-color .15s var(--ease),transform .15s var(--ease-out);
}
.pk-cell:hover{border-color:var(--line-2);transform:translateY(-2px)}
.pk-cell.sel{border-color:var(--neon);box-shadow:0 0 0 2px var(--neon-dim)}
.pk-thumb{width:100%;aspect-ratio:16/10;position:relative;background:#0d0d14;display:block}
.pk-lbl{font-size:11px;font-weight:500;padding:7px 8px;text-align:center;color:var(--ink-2)}
.pk-cell.sel .pk-lbl{color:var(--neon-bright)}

/* rate */
.rate-row{display:flex;align-items:center;gap:10px;margin-top:14px;font-size:12.5px;color:var(--muted)}
.rate-btn{
  width:32px;height:32px;border-radius:9px;border:1px solid var(--line-2);background:var(--surface-2);
  display:flex;align-items:center;justify-content:center;transition:all .14s var(--ease);
}
.rate-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8}
.rate-btn:hover{border-color:var(--neon);color:var(--neon-bright)}
.rate-btn.on-up{background:rgba(52,211,153,.14);border-color:rgba(52,211,153,.4);color:var(--ok)}
.rate-btn.on-down{background:rgba(248,113,113,.12);border-color:rgba(248,113,113,.4);color:var(--stage)}

/* camera guide page */
.guide-cat{margin-bottom:32px}
.guide-cat h3{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:600;margin-bottom:4px}
.guide-cat p{font-size:13px;color:var(--muted);margin-bottom:14px}
.guide-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.guide-item{display:flex;gap:11px;align-items:flex-start;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:13px 15px}
.guide-item b{font-size:13.5px;font-weight:600;display:block;margin-bottom:2px}
.guide-item span{font-size:12px;color:var(--muted);line-height:1.45}

/* toast */
.toast{
  position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);z-index:300;
  background:var(--surface-2);border:1px solid var(--line-2);color:var(--ink);padding:11px 18px;border-radius:100px;
  font-size:13.5px;font-weight:500;box-shadow:0 18px 50px rgba(0,0,0,.5);opacity:0;pointer-events:none;
  transition:all .3s var(--ease);display:flex;align-items:center;gap:9px;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast svg{width:16px;height:16px;stroke:var(--ok);fill:none;stroke-width:2.2}

@media (max-width:920px){
  .app{grid-template-columns:1fr}
  .sidebar{display:none}
  .control-grid{grid-template-columns:1fr}
  .form-row{grid-template-columns:1fr}
}
@media (prefers-reduced-motion:reduce){
  *{animation:none!important;transition-duration:.01ms!important}
}

var projects = SEEDS.map(function(p){ return JSON.parse(JSON.stringify(p)); });
var state = { view:"library", pid:null, draft:null };
var xp = 0; /* style profile */

var toastTimer;
function toast(msg){
  var t=document.getElementById("toast"); document.getElementById("toastMsg").textContent=msg;
  t.classList.add("show"); clearTimeout(toastTimer); toastTimer=setTimeout(function(){t.classList.remove("show");},2000);
}
function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function projById(id){ return projects.filter(function(p){return p.id===id;})[0]; }
function typeName(t){ return t==="dvc"?"AI DVC":t==="ugc"?"UGC":"Product Video"; }
function typeClass(t){ return "type-"+t; }

function addXp(n){
  xp=Math.min(100,xp+n);
  var lvl=Math.floor(xp/20)+1;
  document.getElementById("spBar").style.width=xp+"%";
  document.getElementById("spLvl").textContent="LVL "+lvl;
  var notes=["Rate and edit shots to teach ShotCaller your taste.",
    "Learning your framing preferences...",
    "Noted: you favour slow, motivated moves and low-key grades.",
    "Your style profile is shaping generations now.",
    "Dialled in. New shots default to your taste."];
  document.getElementById("spNote").textContent=notes[Math.min(notes.length-1,lvl-1)];
}

/* copy */
function copyText(txt,btn){
  navigator.clipboard.writeText(txt).then(function(){
    if(btn){ var o=btn.innerHTML; btn.classList.add("done"); btn.innerHTML='<svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>Copied';
      setTimeout(function(){btn.classList.remove("done");btn.innerHTML=o;},1400); }
    toast("Copied to clipboard");
  },function(){toast("Copy failed");});
}
window.copyEl=function(id,btn){ var el=document.getElementById(id); if(el) copyText(el.dataset.raw||el.textContent,btn); };

/* ============================================================
   ROUTER
============================================================ */
function go(view,opts){
  opts=opts||{}; state.view=view;
  if(opts.pid!==undefined) state.pid=opts.pid;
  document.querySelectorAll("#nav .nav-item").forEach(function(b){ b.classList.toggle("active", b.dataset.view===view); });
  window.scrollTo(0,0);
  render();
}
document.getElementById("nav").addEventListener("click",function(e){ var b=e.target.closest(".nav-item"); if(b) go(b.dataset.view); });

function crumb(html){ document.getElementById("crumb").innerHTML=html; }
function reveal(){
  if(reduce) return;
  gsap.from("#content > *",{opacity:0,y:16,duration:.5,ease:"power3.out",stagger:.05});
}

function render(){
  var c=document.getElementById("content");
  if(state.view==="library"){ c.innerHTML=viewLibrary(); crumb("<b>Projects</b>"); }
  else if(state.view==="new"){ c.innerHTML=viewNew(); crumb('<span>Projects</span> / <b>New</b>'); wireNew(); }
  else if(state.view==="classify"){ c.innerHTML=viewClassify(); crumb('<span>New</span> / <b>Classify</b>'); }
  else if(state.view==="deck"){ c.innerHTML=viewDeck(); crumb('<span>Projects</span> / <b>'+esc(projById(state.pid).name)+'</b>'); wireDeck(); }
  else if(state.view==="guide"){ c.innerHTML=viewGuide(); crumb("<b>Camera Guide</b>"); }
  reveal();
}

/* ---------- CLASSIFY ---------- */
function guessType(text){
  var s=text.toLowerCase();
  if(/creator|grwm|testimonial|selfie|to camera|routine|unbox|review/.test(s)) return "ugc";
  if(/(product|bottle|case|device|earbud|rotates|beauty shot|hero shot)/.test(s) && !/man|woman|walks|house|memory/.test(s)) return "product";
  return "dvc";
}
function startClassify(e){
  e.preventDefault();
  var f=e.target;
  state.draft={ screenplay:f.screenplay.value.trim(), platform:f.platform.value, ar:f.ar.value, dur:parseInt(f.dur.value,10)||30 };
  state.draft.type=guessType(state.draft.screenplay);
  go("classify");
  return false;
}

  dvc:"It reads as a narrative, emotion-led piece with characters and a signature image — a cinematic commercial, not a product demo or a creator video.",

/* ---------- INTAKE WIZARD ---------- */
var wiz={qs:[],i:0,answers:[]};
window.openWizard=function(){
  var t=state.draft.type;
  wiz.qs=INTAKE[t].slice(); wiz.i=0; wiz.answers=wiz.qs.map(function(q){return q.opts[q.rec];});
  document.getElementById("wizardOverlay").classList.add("open");
  renderWiz();
};
function closeWizard(){ document.getElementById("wizardOverlay").classList.remove("open"); }
function renderWiz(){
  var q=wiz.qs[wiz.i];
  document.getElementById("wizProg").style.width=((wiz.i)/(wiz.qs.length)*100)+"%";
  var body=document.getElementById("wizBody");
  body.innerHTML='<div class="wiz-step">Question '+(wiz.i+1)+' of '+wiz.qs.length+'</div>'+
    '<div class="wiz-q">'+esc(q.q)+'</div>'+
    '<div class="wiz-opts">'+q.opts.map(function(o,i){
      var sel=wiz.answers[wiz.i]===o;
      return '<button class="wiz-opt'+(sel?" sel":"")+'" data-o="'+esc(o)+'">'+esc(o)+
        (i===q.rec?'<span class="aipick">✦ AI pick</span>':'')+'</button>';
    }).join("")+'</div>'+
    '<div class="wiz-other"><input type="text" id="wizOther" placeholder="Other — type your own..." value="'+(q.opts.indexOf(wiz.answers[wiz.i])===-1?esc(wiz.answers[wiz.i]):"")+'"></div>';
  if(!reduce) gsap.from(body,{opacity:0,x:20,duration:.32,ease:"power3.out"});
  body.querySelectorAll(".wiz-opt").forEach(function(b){
    b.addEventListener("click",function(){ wiz.answers[wiz.i]=b.dataset.o; document.getElementById("wizOther").value=""; renderWiz(); });
  });
  document.getElementById("wizBack").disabled=wiz.i===0;
  document.getElementById("wizNext").textContent=wiz.i===wiz.qs.length-1?"Generate ✦":"Next →";
}
document.getElementById("wizBack").addEventListener("click",function(){ if(wiz.i>0){wiz.i--;renderWiz();} });
document.getElementById("wizNext").addEventListener("click",function(){
  var other=document.getElementById("wizOther"); if(other && other.value.trim()) wiz.answers[wiz.i]=other.value.trim();
  if(wiz.i<wiz.qs.length-1){ wiz.i++; renderWiz(); }
  else { closeWizard(); runGeneration(); }
});
document.getElementById("wizardOverlay").addEventListener("click",function(e){ if(e.target===this) closeWizard(); });

function runGeneration(){
  var c=document.getElementById("content");
  c.innerHTML='<div class="slate-wrap"><div class="slate"><div class="slate-top"></div>'+
    '<div class="slate-body">SCENE <b>01</b> · TAKE <b>01</b><br>'+typeName(state.draft.type)+'<br>'+esc(state.draft.ar)+' · '+state.draft.dur+'s<br><b>ROLL</b></div></div>'+
    '<h2>Calling the shots…</h2><div class="slate-status" id="slateStatus">Reading the screenplay</div></div>';
  var steps=["Reading the screenplay","Locking the creative spine","Assigning camera language","Writing paste-ready prompts","Applying anti-slop rules","Building the moodboard"];
  var si=0;
  var iv=setInterval(function(){
    si++; var el=document.getElementById("slateStatus");
    if(!el){ clearInterval(iv); return; }
    if(si>=steps.length){ clearInterval(iv); finishGeneration(); return; }
    el.textContent=steps[si]+"…";
  },520);
}
function finishGeneration(){
  /* demo: clone the seed matching the chosen type as the generated result, or template it */
  var t=state.draft.type;
  var base=SEEDS.filter(function(s){return s.type===t;})[0];
  var proj;
  if(base){ proj=JSON.parse(JSON.stringify(base)); }
  else { proj=JSON.parse(JSON.stringify(SEEDS[0])); proj.type=t; }
  proj.id="gen-"+Date.now();
  proj.name=(state.draft.screenplay.split(/[.\n]/)[0]||"Untitled").slice(0,42);
  proj.screenplay=state.draft.screenplay;
  proj.ar=state.draft.ar; proj.platform=state.draft.platform; proj.dur=state.draft.dur;
  proj.intake=wiz.qs.map(function(q,i){return {question:q.q,answer:wiz.answers[i]};});
  projects.unshift(proj);
  addXp(6);
  go("deck",{pid:proj.id});
  toast("Shot deck ready");
}

}

function controlsPanel(p,s){
  var cats=["shotSize","angle","movement","lensFocus","lighting","energy"];
  var grid=cats.map(function(cat){
    var cur=s.controls[cat];
    var opts=VOCAB[cat].opts.map(function(o){ return '<option'+(o[0]===cur?" selected":"")+'>'+o[0]+'</option>'; }).join("");
    var fl=flagFor(cat,cur);
    return '<div class="control"><label>'+VOCAB[cat].label+'<span class="flag '+flagClass(fl)+'"><i></i>'+(fl==="ok"?"1 clip":fl==="warn"?"keep simple":"post")+'</span></label>'+
      '<div class="select-wrap"><select data-cat="'+cat+'" data-sid="'+s.id+'">'+opts+'</select></div>'+
      '<div class="explain" id="ex-'+cat+'-'+s.id+'">'+esc(explainFor(cat,cur))+'</div></div>';
  }).join("");
  var stageMove=flagFor("movement",s.controls.movement)==="stage";
  return '<div class="control-grid">'+grid+'</div>'+
    (stageMove?'<div class="stage-warn"><svg viewBox="0 0 24 24"><path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg><span>This is an edit-stage technique — the prompt will describe the closest in-clip version and note the rest for post.</span></div>':'')+
    /* visual picker */
    '<div class="picker" id="picker-'+s.id+'">'+visualPicker(p,s)+'</div>'+
    '<div class="cp-actions"><button class="btn btn-primary" onclick="rebuildShot(\''+p.id+'\',\''+s.id+'\')"><svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/></svg>Rebuild shot</button></div>';
}
/* visual picker: SVG diagram thumbnails for shot size + angle (swap for photos later) */
function visualPicker(p,s){
  var tab=deckState["pk-"+s.id]||"shotSize";
  var tabs=[["shotSize","Shot size"],["angle","Angle"],["lighting","Lighting"],["movement","Movement"]];
  var head='<div style="font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:4px 0 10px">Pick the look</div>'+
    '<div class="picker-tabs">'+tabs.map(function(t){ return '<button class="pk-tab'+(t[0]===tab?" active":"")+'" onclick="setPicker(\''+s.id+'\',\''+t[0]+'\')">'+t[1]+'</button>'; }).join("")+'</div>';
  var cur=s.controls[tab];
  var grid='<div class="pk-grid">'+VOCAB[tab].opts.map(function(o){
    return '<button class="pk-cell'+(o[0]===cur?" sel":"")+'" onclick="pickShot(\''+s.id+'\',\''+tab+'\',\''+esc(o[0]).replace(/'/g,"\\'")+'\')">'+
      '<span class="pk-thumb">'+shotDiagram(tab,o[0])+'</span><span class="pk-lbl">'+esc(o[0])+'</span></button>';
  }).join("")+'</div>';
  return head+grid;
}
window.setPicker=function(sid,tab){ deckState["pk-"+sid]=tab; document.getElementById("picker-"+sid).innerHTML=visualPicker(projById(state.pid),shotById(sid)); };
window.pickShot=function(sid,cat,val){
  var s=shotById(sid); s.controls[cat]=val;
  var sel=document.querySelector('select[data-cat="'+cat+'"][data-sid="'+sid+'"]'); if(sel) sel.value=val;
  var ex=document.getElementById("ex-"+cat+"-"+sid); if(ex) ex.textContent=explainFor(cat,val);
  document.getElementById("picker-"+sid).innerHTML=visualPicker(projById(state.pid),s);
  addXp(2);
};
function shotById(id){ var p=projById(state.pid); return p.shots.filter(function(s){return s.id===id;})[0]; }

/* tiny SVG diagrams (placeholder art until real photos are dropped in) */
function shotDiagram(cat,name){
  var W=104,H=65,f='fill="none" stroke="#3B7BFF" stroke-width="1.4"';
  function frame(){ return '<rect x="6" y="6" width="'+(W-12)+'" height="'+(H-12)+'" rx="4" '+f+' opacity=".35"/>'; }
  function person(cx,top,h){ var hd=h*0.22; return '<circle cx="'+cx+'" cy="'+(top+hd)+'" r="'+hd+'" '+f+'/><path d="M'+cx+' '+(top+hd*2)+' L'+cx+' '+(top+h*0.7)+' M'+(cx-h*0.16)+' '+(top+h*0.36)+' L'+(cx+h*0.16)+' '+(top+h*0.36)+' M'+cx+' '+(top+h*0.7)+' L'+(cx-h*0.14)+' '+(top+h)+' M'+cx+' '+(top+h*0.7)+' L'+(cx+h*0.14)+' '+(top+h)+'" '+f+'/>'; }
  var svg='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:100%;display:block">'+frame();
  if(cat==="shotSize"){
    var map={"Extreme Wide":[52,40,10],"Wide":[52,26,30],"Full Shot":[52,20,40],"Cowboy":[52,10,60],"Medium":[52,4,80],"Medium Close-Up":[52,-6,100],"Close-Up":[52,-30,150],"Extreme Close-Up":[52,-70,240]};
    var m=map[name]||[52,20,40]; svg+='<g>'+person(m[0],m[1],m[2])+'</g>';
  } else if(cat==="angle"){
    svg+=person(52,16,34);
    var arrows={"Eye-level":"M18 33 H86","Low-angle":"M20 48 L84 20","High-angle":"M20 20 L84 48","Overhead":"M52 10 L52 54","Worm's-eye":"M28 54 L52 14 L76 54","Dutch / canted":"M18 44 L86 26"};
    svg+='<path d="'+(arrows[name]||arrows["Eye-level"])+'" stroke="#6FA0FF" stroke-width="1.6" fill="none" opacity=".8" stroke-dasharray="3 3"/>';
  } else if(cat==="lighting"){
    svg+=person(52,16,34);
    var pos={"Golden-hour backlight":[52,8],"Window daylight":[16,20],"Hard direct flash":[52,58],"Practical night":[80,44],"Overcast soft":[52,6],"Low-key single source":[24,14],"High-key even":[52,4],"Ring light":[52,52]};
    var pp=pos[name]||[52,8]; var glow=name==="Low-key single source"?".9":name==="High-key even"?".25":".55";
    svg+='<circle cx="'+pp[0]+'" cy="'+pp[1]+'" r="7" fill="#FBBF24" opacity="'+glow+'"/><circle cx="'+pp[0]+'" cy="'+pp[1]+'" r="13" fill="#FBBF24" opacity=".12"/>';
  } else { /* movement arrows */
    svg+=person(52,18,30);
    var mv={"Static":"","Pan":"M20 33 H84","Whip pan":"M20 33 H84","Tilt":"M52 12 V54","Slow zoom":"M30 20 L74 46 M74 20 L30 46","Crash zoom":"M30 20 L74 46 M74 20 L30 46","Dolly in":"M20 33 L84 33","Dolly out":"M84 33 L20 33","Truck":"M20 44 H84","Slider":"M24 46 H80","Pedestal":"M52 54 V12","Push-past":"M20 40 H84","Arc":"M22 46 A40 40 0 0 1 82 46","Orbit":"M52 52 A26 20 0 1 1 52 12","Tracking":"M18 44 H86","Follow / OTS":"M30 46 H78","Reverse track":"M84 44 H18","Low tracking":"M18 52 H86","Handheld":"M22 30 q10 -8 20 0 t20 0 t20 0","Steadicam":"M20 40 H84","Crane":"M52 54 L52 14 L78 14","Drone push / pull":"M28 46 L76 18","First-person POV":"M40 26 A16 12 0 1 1 40 44","Dolly-zoom":"M26 22 L78 44 M78 22 L26 44","Bullet time":"M52 50 A22 22 0 1 1 74 33","Speed ramp":"M18 40 h24 l6 -14 l6 14 h30","Hyperlapse":"M20 46 L84 20"};
    var d=mv[name]; if(d) svg+='<path d="'+d+'" stroke="#6FA0FF" stroke-width="1.7" fill="none" opacity=".85" marker-end="url(#ah)"/>';
    svg+='<defs><marker id="ah" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0 0 L6 3 L0 6 z" fill="#6FA0FF"/></marker></defs>';
  }
  return svg+'</svg>';
}

/* deck interactions */
function wireDeck(){
  var c=document.getElementById("content");
  c.querySelectorAll(".tab").forEach(function(t){
    t.addEventListener("click",function(){
      var sid=t.dataset.sid, tab=t.dataset.tab;
      c.querySelectorAll('.tab[data-sid="'+sid+'"]').forEach(function(x){x.classList.toggle("active",x===t);});
      c.querySelectorAll('.tab-pane[data-sid="'+sid+'"]').forEach(function(pane){ pane.style.display=pane.dataset.pane===tab?"":"none"; });
    });
  });
  c.querySelectorAll("select[data-cat]").forEach(function(sel){
    sel.addEventListener("change",function(){
      var sid=sel.dataset.sid, cat=sel.dataset.cat;
      shotById(sid).controls[cat]=sel.value;
      var ex=document.getElementById("ex-"+cat+"-"+sid); if(ex) ex.textContent=explainFor(cat,sel.value);
      document.getElementById("picker-"+sid).innerHTML=visualPicker(projById(state.pid),shotById(sid));
    });
  });
  c.querySelectorAll(".rate-btn").forEach(function(b){
    b.addEventListener("click",function(){
      var row=b.parentElement; row.querySelectorAll(".rate-btn").forEach(function(x){x.classList.remove("on-up","on-down");});
      b.classList.add(b.dataset.rate==="up"?"on-up":"on-down");
      addXp(4); toast(b.dataset.rate==="up"?"Noted — more like this":"Noted — ShotCaller will adjust");
    });
  });
}
window.toggleControls=function(sid){
  var el=document.getElementById("cp-"+sid); el.classList.toggle("open");
};
window.rebuildShot=function(pid,sid){
  var s=shotById(sid);
  /* demo: rewrite the video prompt's opening + movement clause to reflect the picked controls */
  var mv=s.controls.movement, size=s.controls.shotSize, ang=s.controls.angle, lens=s.controls.lensFocus, light=s.controls.lighting;
  var stage=flagFor("movement",mv)==="stage";
  var moveClause=stage
    ? "Camera: holds the closest in-clip version of a "+mv.toLowerCase()+" (full "+mv.toLowerCase()+" staged in post)"
    : "Camera: a "+(s.controls.energy.toLowerCase().indexOf("kinetic")>-1?"decisive":"measured")+" "+mv.toLowerCase()+", motivated and controlled";
  var rebuilt=size+" shot, "+lens.toLowerCase()+", "+ang.toLowerCase()+". "+moveClause+". "+
    s.video.replace(/^[^.]+\.\s*Camera:[^.]+\.\s*/,"").replace(/^[^.]+\.\s*/,"");
  s.video=rebuilt;
  if(stage && !s.post) s.post="Full "+mv+" is an edit-stage move — complete it in post.";
  addXp(3);
  render();
  toast("Shot "+ (s.number<10?"0":"")+s.number+" rebuilt with your controls");
};
window.refineFrame=function(pid,sid){
  var what=prompt("Refine this start-frame — what should change?\n(e.g. relight with warm golden side light / regrade teal shadows / darken the background)");
  if(!what) return;
  var s=shotById(sid);
  var refined="Using the provided reference image, keep the same subject, pose, outfit, and composition intact, but "+what.trim()+". Do not change the character design. Preserve realistic skin texture, natural pores, subtle imperfections.";
  navigator.clipboard.writeText(refined).then(function(){toast("Refine prompt copied");},function(){});
  addXp(2);
};
window.copyAll=function(kind){
  var p=projById(state.pid);
  var txt=p.shots.map(function(s){
    var head="SHOT "+(s.number<10?"0":"")+s.number+" — "+s.name;
    return head+"\n"+(kind==="img"?(s.startFrame||"(no image prompt)"):s.video);
  }).join("\n\n");
  copyText(txt);
};

/* ---------- CAMERA GUIDE ---------- */
function viewGuide(){
  var cats=[["shotSize","Shot Size","How much of the world the frame holds — from vast isolation to a single eye."],
    ["angle","Angle","Where the camera sits relative to the subject — and the power that implies."],
    ["movement","Movement","One move per shot. What the camera does is what the audience feels."],
    ["lensFocus","Lens / Focus","How depth and compression shape attention."],
    ["lighting","Lighting","Always a motivated source — never just 'well lit'."],
    ["energy","Energy","The pace the whole shot carries."]];
  return '<div class="page-head"><div class="eyebrow">Reference</div><h1>Camera Guide</h1><p>The vocabulary ShotCaller speaks. Every option here can be picked per shot — the dropdowns teach it while you work.</p></div>'+
    '<div style="margin-top:26px">'+cats.map(function(c){
      return '<div class="guide-cat"><h3>'+c[1]+'</h3><p>'+c[2]+'</p><div class="guide-list">'+
        VOCAB[c[0]].opts.map(function(o){
          var fl=o[2];
          return '<div class="guide-item"><span class="flag '+flagClass(fl)+'" style="margin:2px 0 0"><i></i></span>'+
            '<div><b>'+esc(o[0])+'</b><span>'+esc(o[1])+'</span></div></div>';
        }).join("")+'</div></div>';
    }).join("")+'</div>';
}

/* boot */
addXp(0);
document.getElementById("spBar").style.width="0%";
render();
</script>
